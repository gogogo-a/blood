<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血糖分析报告 - 血糖管理系统</title>
    <link rel="stylesheet" href="css/report.css">
    <link rel="stylesheet" href="css/public.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <div class="top-nav">
            <div class="back-btn" onclick="history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#007AFF">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </div>
            <h1>血糖分析报告</h1>
            <div class="export-btn" onclick="exportReport()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#007AFF">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
            </div>
        </div>

        <!-- 时间范围选择 -->
        <div class="time-selector">
            <button class="time-btn active" data-range="week">近7天</button>
            <button class="time-btn" data-range="month">近30天</button>
            <button class="time-btn" data-range="quarter">近3个月</button>
        </div>

        <!-- 报告概览卡片 -->
        <div class="overview-card">
            <div class="report-header">
                <div class="report-icon">📊</div>
                <div class="report-title">
                    <h2>血糖健康报告</h2>
                    <p id="report-period">2024年12月22日 - 12月28日</p>
                </div>
                <div class="health-score" id="health-score">
                    <div class="score-value">--</div>
                    <div class="score-label">健康评分</div>
                </div>
            </div>
        </div>

        <!-- 核心指标 -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-icon" style="background: linear-gradient(135deg, #007AFF, #5856D6);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="metric-info">
                    <div class="metric-value" id="avg-blood-sugar">--</div>
                    <div class="metric-label">平均血糖</div>
                    <div class="metric-unit">mmol/L</div>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon" style="background: linear-gradient(135deg, #34C759, #30D158);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                </div>
                <div class="metric-info">
                    <div class="metric-value" id="normal-rate">--</div>
                    <div class="metric-label">达标率</div>
                    <div class="metric-unit">%</div>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon" style="background: linear-gradient(135deg, #FF9500, #FF6B00);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
                    </svg>
                </div>
                <div class="metric-info">
                    <div class="metric-value" id="fluctuation">--</div>
                    <div class="metric-label">波动幅度</div>
                    <div class="metric-unit">mmol/L</div>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon" style="background: linear-gradient(135deg, #AF52DE, #5856D6);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-4H6v-2h4V7h2v4h4v2h-4v4z"/>
                    </svg>
                </div>
                <div class="metric-info">
                    <div class="metric-value" id="record-count">--</div>
                    <div class="metric-label">记录次数</div>
                    <div class="metric-unit">次</div>
                </div>
            </div>
        </div>

        <!-- 血糖分布图 -->
        <div class="chart-card">
            <div class="card-header">
                <h3>📈 血糖趋势</h3>
            </div>
            <div class="chart-container" id="trend-chart"></div>
        </div>

        <!-- 血糖分布饼图 -->
        <div class="chart-card">
            <div class="card-header">
                <h3>🎯 血糖分布</h3>
            </div>
            <div class="distribution-container">
                <div class="chart-container" id="distribution-chart"></div>
                <div class="distribution-legend" id="distribution-legend"></div>
            </div>
        </div>

        <!-- 详细分析 -->
        <div class="analysis-card">
            <div class="card-header">
                <h3>🔍 详细分析</h3>
            </div>
            <div class="analysis-content" id="analysis-content">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- AI 建议 -->
        <div class="suggestion-card">
            <div class="card-header">
                <h3>💡 AI 健康建议</h3>
                <span class="ai-badge">智能分析</span>
            </div>
            <div class="suggestion-list" id="suggestion-list">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 时段分析 -->
        <div class="period-card">
            <div class="card-header">
                <h3>⏰ 时段血糖分析</h3>
            </div>
            <div class="period-grid" id="period-grid">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/echarts.js"></script>
    <script src="js/report.js"></script>
</body>
</html>
