<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>话题详情 </title>
    <link rel="stylesheet" href="css/topic.css">
    <link rel="stylesheet" href="css/public.css">
    <link rel="stylesheet" href="css/all.min.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <!-- 主要内容区域 -->
    <main class="topic-container">
        <!-- 加载状态 -->
        <div id="loading" class="loading">加载中...</div>

        <!-- 错误信息 -->
        <div id="error" class="error" style="display: none;">加载失败，请刷新页面重试</div>

        <!-- 话题详情 -->
        <div id="topic-content" class="topic-content" style="display: none;">
            <!-- 话题头部 -->
            <div class="topic-header">
                <div class="topic-author">
                    <img id="author-avatar" src="https://via.placeholder.com/40" alt="用户头像" class="author-avatar">
                    <div class="author-info">
                        <div id="author-name" class="author-name">用户名</div>
                        <div id="create-date" class="create-date">发布时间</div>
                    </div>
                </div>
                <div class="topic-stats">
                    <span class="post-views">
                        <svg class="icon" viewBox="0 0 24 24" width="16" height="16" fill="#86868B">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                        <span id="page-view">0</span>
                    </span>
                    <span class="post-comments">
                        <svg class="icon" viewBox="0 0 24 24" width="16" height="16" fill="#86868B">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6l-2 2V4h14v10z"/>
                        </svg>
                        <span id="comment-count">0</span>
                    </span>
                </div>
                <!-- 话题点赞按钮 -->
                <button id="topic-like-button" class="like-button">
                    <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="gray">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    <span id="topic-like-count">0</span>
                </button>
            </div>

            <!-- 话题标题 -->
            <h1 id="topic-title" class="topic-title">话题标题</h1>

            <!-- 话题内容 -->
            <div id="topic-content-body" class="topic-content-body"></div>

          
        <!-- 评论区域 -->
        <div id="comments-section" class="comments-section" style="display: none;">
            <h2 class="comments-title">评论</h2>
            <div class="comments-list" id="comments-list">
                <!-- 评论项将通过 JavaScript 动态添加 -->
            </div>
        </div>

          <!-- 评论输入框 -->
          <div class="comment-input-container">
            <textarea id="comment-input" class="comment-input" placeholder="写下你的评论..."></textarea>
            <button id="submit-comment" class="submit-comment">发布</button>
        </div>
    </main>

    <!-- 底部导航栏占位 -->
    <div class="footer-placeholder"></div>
    <script src="js/config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/topic.js"></script>
</body>
</html>
