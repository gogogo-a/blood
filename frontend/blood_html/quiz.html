<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康知识闯关 - 血糖管理系统</title>
    <link rel="stylesheet" href="css/quiz.css">
    <link rel="stylesheet" href="css/public.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <div class="container">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="back-btn" onclick="history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#007AFF">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </div>
            <h1>健康知识闯关</h1>
            <div class="balance-display">
                <span class="sugar-bean-icon">🍬</span>
                <span id="current-balance">0</span>
            </div>
        </div>

        <!-- 关卡选择界面 -->
        <div class="level-select" id="level-select">
            <div class="level-header">
                <h2>🏆 选择关卡</h2>
                <p class="level-tip">通关可获得糖豆奖励，难度越高奖励越多</p>
            </div>
            <div class="level-grid" id="level-grid">
                <!-- 动态生成关卡 -->
            </div>
            <div class="progress-summary" id="progress-summary">
                <span class="progress-text">已通关 <em id="passed-count">0</em> / <em id="total-levels">0</em> 关</span>
            </div>
        </div>

        <!-- 答题界面 -->
        <div class="quiz-area" id="quiz-area" style="display: none;">
            <!-- 关卡信息 -->
            <div class="level-info-card">
                <div class="level-badge" id="level-badge">第1关</div>
                <div class="level-name" id="level-name">血糖基础</div>
                <div class="level-reward">
                    <span class="sugar-bean-icon">🍬</span>
                    通关奖励 <em id="level-reward">5</em> 糖豆
                </div>
            </div>

            <!-- 游戏信息卡片 -->
            <div class="game-info-card">
                <div class="info-item">
                    <div class="info-label">当前题目</div>
                    <div class="info-value"><span id="current-question">1</span> / <span id="total-questions">5</span></div>
                </div>
                <div class="info-item">
                    <div class="info-label">正确率</div>
                    <div class="info-value"><span id="accuracy">0</span>%</div>
                </div>
                <div class="info-item">
                    <div class="info-label">通关分数</div>
                    <div class="info-value"><span id="pass-score">60</span>%</div>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <!-- 问题卡片 -->
            <div class="question-card" id="question-card">
                <div class="question-badge">
                    <span class="category" id="category">基础知识</span>
                </div>
                <div class="question-text" id="question-text">
                    正在加载题目...
                </div>
                <div class="options-container" id="options-container">
                    <!-- 选项动态生成 -->
                </div>
            </div>

            <!-- 结果反馈 -->
            <div class="result-feedback" id="result-feedback">
                <div class="result-icon" id="result-icon"></div>
                <div class="result-text" id="result-text"></div>
                <div class="result-explanation" id="result-explanation"></div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button class="btn-next" id="btn-next" style="display: none;">
                    下一题
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 完成卡片 -->
        <div class="completion-card" id="completion-card" style="display: none;">
            <div class="completion-icon" id="completion-icon">🎉</div>
            <h2 id="completion-title">恭喜通关！</h2>
            <div class="completion-stats">
                <div class="stat-item">
                    <div class="stat-value" id="final-correct">0</div>
                    <div class="stat-label">答对题数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="final-accuracy">0%</div>
                    <div class="stat-label">正确率</div>
                </div>
                <div class="stat-item highlight">
                    <div class="stat-value">
                        <span class="sugar-bean-icon">🍬</span>
                        +<span id="final-earned">0</span>
                    </div>
                    <div class="stat-label">获得糖豆</div>
                </div>
            </div>
            <div class="completion-message" id="completion-message"></div>
            <div class="completion-buttons">
                <button class="btn-restart" onclick="backToLevels()">返回关卡</button>
                <button class="btn-next-level" id="btn-next-level" onclick="nextLevel()">下一关</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
