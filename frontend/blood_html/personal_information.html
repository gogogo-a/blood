<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息</title>
    <link rel="stylesheet" href="css/personal_information.css">
    <link rel="stylesheet" href="css/public.css">
    <script src="js/theme.js"></script>
    <script defer src="js/navbar.js"></script>
</head>
<body>
    <div class="container">
        <!-- 基本信息区块 -->
        <div class="info-section">
            <div class="section-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>基本信息</span>
            </div>
            <div class="info-card" id="user-info">
                <div class="info-item" onclick="toggleEditModal()">
                    <div class="info-left">
                        <span class="info-label">用户名</span>
                        <span class="info-value" id="username">-</span>
                    </div>
                    <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </div>
                <div class="info-item" onclick="toggleEditModal()">
                    <div class="info-left">
                        <span class="info-label">邮箱</span>
                        <span class="info-value" id="email">-</span>
                    </div>
                    <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </div>
                <div class="info-item" onclick="toggleEditModal()">
                    <div class="info-left">
                        <span class="info-label">生日</span>
                        <span class="info-value" id="birthday">-</span>
                    </div>
                    <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- 会员信息区块 -->
        <div class="info-section">
            <div class="section-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <span>会员信息</span>
            </div>
            <div class="info-card">
                <div class="info-item">
                    <div class="info-left">
                        <span class="info-label">会员等级</span>
                        <span class="info-value level-badge" id="level-title">-</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-left">
                        <span class="info-label">专属折扣</span>
                        <span class="info-value discount-value" id="level-percent">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 账户安全区块 -->
        <div class="info-section">
            <div class="section-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <span>账户安全</span>
            </div>
            <div class="info-card">
                <div class="info-item" onclick="toggleEditModal()">
                    <div class="info-left">
                        <span class="info-label">修改密码</span>
                        <span class="info-hint">定期更换密码更安全</span>
                    </div>
                    <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- 安全提示 -->
        <div class="security-notice">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span>您的个人信息已加密保护</span>
        </div>
    </div>

    <!-- 修改信息模态框 -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>修改个人信息</h3>
                <span class="close-btn" id="close-edit-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </span>
            </div>
            <form id="edit-form">
                <div class="form-group">
                    <label for="edit-username">用户名</label>
                    <input type="text" id="edit-username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="edit-email">邮箱</label>
                    <input type="email" id="edit-email" placeholder="请输入邮箱地址" required>
                </div>
                <div class="form-group">
                    <label for="edit-birthday">生日</label>
                    <input type="date" id="edit-birthday" required>
                </div>
                <button type="submit">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    保存修改
                </button>
            </form>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/personal_information.js"></script>
</body>
</html>
