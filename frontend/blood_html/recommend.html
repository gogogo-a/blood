<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能推荐</title>
    <link rel="stylesheet" href="css/public.css">
    <link rel="stylesheet" href="css/recommend.css">
    <script src="js/theme.js"></script>
    <script defer src="js/navbar.js"></script>
</head>
<body>
    <div class="main-container">
        <!-- 健康资讯轮播 -->
        <section class="news-section">
            <div class="news-header">
                <h2 class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#86868B">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                    </svg>
                    <span>健康资讯</span>
                </h2>
                <span class="news-more" onclick="showAllNews()">更多 ›</span>
            </div>
            
            <!-- 头条新闻 -->
            <div class="news-featured" id="featured-news">
                <!-- 动态生成 -->
            </div>
            
            <!-- 资讯列表 -->
            <div class="news-list" id="news-list">
                <!-- 动态生成 -->
            </div>
            
            <!-- 健康知识标签 -->
            <div class="knowledge-tags">
                <span class="tag-item" onclick="filterNews('diet')">🥗 饮食指南</span>
                <span class="tag-item" onclick="filterNews('exercise')">🏃 运动建议</span>
                <span class="tag-item" onclick="filterNews('medicine')">💊 用药知识</span>
                <span class="tag-item" onclick="filterNews('research')">🔬 最新研究</span>
                <span class="tag-item" onclick="filterNews('life')">🌿 生活方式</span>
            </div>
        </section>

        <!-- AI 智能助手 - 核心特色 -->
        <section class="ai-assistant-section">
            <div class="ai-assistant-card" onclick="window.location.href='chat.html'">
                <!-- 背景装饰 -->
                <div class="ai-bg-decoration">
                    <div class="ai-circle circle-1"></div>
                    <div class="ai-circle circle-2"></div>
                    <div class="ai-circle circle-3"></div>
                </div>
                
                <!-- 主内容 -->
                <div class="ai-card-content">
                    <div class="ai-avatar-wrapper">
                        <div class="ai-avatar-glow"></div>
                        <img src="image/ai.jpg" alt="AI助手" class="ai-avatar">
                        <div class="ai-status-dot"></div>
                    </div>
                    
                    <div class="ai-info">
                        <div class="ai-badge">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/>
                            </svg>
                            AI 驱动
                        </div>
                        <h3 class="ai-title">智能健康助手</h3>
                        <p class="ai-desc">基于 AI 大模型，为您提供专业的血糖管理建议、饮食指导和健康咨询</p>
                        
                        <div class="ai-features">
                            <span class="ai-feature">🍽️ 饮食分析</span>
                            <span class="ai-feature">💊 用药提醒</span>
                            <span class="ai-feature">📊 数据解读</span>
                            <span class="ai-feature">❓ 即时问答</span>
                        </div>
                    </div>
                    
                    <div class="ai-action">
                        <div class="ai-action-btn">
                            <span>开始对话</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
                            </svg>
                        </div>
                        <div class="ai-hint">24小时在线 · 免费使用</div>
                    </div>
                </div>
                
                <!-- 动态粒子效果 -->
                <div class="ai-particles" id="ai-particles"></div>
            </div>
        </section>

        <!-- 推荐卡片区域 -->
        <section class="recommend-section">
            <h2 class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#86868B">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>
                <span>今日推荐</span>
            </h2>
            <div id="food-recommend" class="recommend-card">
                <div class="card-content">
                    <h3>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="#86868B">
                            <path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05l-5 2v5.12c0 .97-.78 1.75-1.75 1.75H11.5v2.5c0 1.38 1.12 2.5 2.5 2.5h4.06v4.07zM1 21.99h15v-2H1v2zm14.5-15.5c0-1.38-1.12-2.5-2.5-2.5s-2.5 1.12-2.5 2.5 1.12 2.5 2.5 2.5 2.5-1.12 2.5-2.5zM1 17.99h15v-2H1v2zm0-4h15v-2H1v2z"/>
                        </svg>
                        饮食推荐
                    </h3>
                    <div class="recommend-status"></div>
                    <button class="primary-btn get-recommend-btn" data-type="food" style="display: none;">
                        获取今日食物推荐
                    </button>
                </div>
            </div>

            <div id="sport-recommend" class="recommend-card">
                <div class="card-content">
                    <h3>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="#86868B">
                            <path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/>
                        </svg>
                        定制推荐
                    </h3>
                    <div class="recommend-status"></div>
                    <button class="primary-btn get-recommend-btn" data-type="sport" style="display: none;">
                        获取今日定制运动推荐和食物推荐
                    </button>
                </div>
            </div>
        </section>
    </div>


    <script src="js/config.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="js/recommend.js"></script>
    <script src="js/news.js"></script>
</body>
</html>
