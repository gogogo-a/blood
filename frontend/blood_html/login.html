<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 血糖管理系统</title>
    <link rel="stylesheet" href="css/auth.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>血糖管理系统</h1>
            <p>欢迎回来</p>
        </div>

        <div class="login-tabs">
            <div class="tab active" onclick="switchTab('password')">账号密码登录</div>
            <div class="tab" onclick="switchTab('email')">邮箱验证码登录</div>
        </div>

        <!-- 账号密码登录表单 -->
        <div class="form-content active" id="password-login">
            <form id="login-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码">
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>
        </div>

        <!-- 邮箱验证码登录表单 -->
        <div class="form-content" id="email-login">
            <form id="email-login-form">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="email" placeholder="请输入邮箱">
                    <div class="error-message" id="email-error"></div>
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <div class="verify-code-group">
                        <input type="text" id="verify-code" placeholder="请输入验证码">
                        <button type="button" class="verify-code-btn">获取验证码</button>
                    </div>
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>
        </div>

        <div class="register-link">
            还没有账号？<a href="register.html">立即注册</a>
            <span class="divider">|</span>
            <a href="https://9p47q51245.goho.co/back/login/" class="admin-link" target="_blank">管理员登录</a>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
