<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的</title>
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/public.css">
    <script src="js/theme.js"></script>
    <script defer src="js/navbar.js"></script>
    <script src="js/profile.js"></script>
</head>
<body>
    <div class="profile-container">
        <!-- 用户头像卡片 -->
        <div class="profile-header-card">
            <div class="avatar-wrapper">
                <img src="" alt="头像" id="avatar-preview" onclick="document.getElementById('image-input').click();">
                <div class="avatar-edit-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                    </svg>
                </div>
            </div>
            <div id="uploadSpinner" class="upload-spinner">上传中...</div>
            <div id="uploadSuccessMessage" class="upload-success">上传成功</div>
            <input type="file" id="image-input" style="display:none;" accept="image/*">
            <h2 class="username" id="username">用户名</h2>
            <div class="user-meta">
                <span id="gender"></span>
                <span id="age"></span>
            </div>
            <!-- 成就徽章展示 -->
            <div class="badges-showcase" id="badges-showcase">
                <!-- 徽章由JS动态渲染 -->
            </div>
        </div>

        <!-- 糖豆卡片 -->
        <div class="balance-card">
            <div class="balance-info">
                <span class="balance-label">
                    <span class="sugar-bean-icon">🍬</span>
                    我的糖豆
                </span>
                <span class="balance-value" id="balance">0</span>
            </div>
            <button class="recharge-btn" onclick="redirectToPay(event)">
                充值
            </button>
        </div>

        <!-- 功能列表 -->
        <div class="menu-card">
            <div class="menu-item" onclick="redirectTopersonal_information(event)">
                <div class="menu-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#1D1D1F">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <span class="menu-text">个人信息</span>
                <svg class="menu-arrow" width="20" height="20" viewBox="0 0 24 24" fill="#C7C7CC">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </div>

            <div class="menu-item" onclick="redirectTotopic(event)">
                <div class="menu-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#1D1D1F">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
                    </svg>
                </div>
                <span class="menu-text">我的话题</span>
                <svg class="menu-arrow" width="20" height="20" viewBox="0 0 24 24" fill="#C7C7CC">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </div>

            <div class="menu-item" onclick="redirectToorder(event)">
                <div class="menu-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#1D1D1F">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                    </svg>
                </div>
                <span class="menu-text">订单详情</span>
                <svg class="menu-arrow" width="20" height="20" viewBox="0 0 24 24" fill="#C7C7CC">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </div>

            <div class="menu-item" onclick="location.href='shop.html'">
                <div class="menu-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#1D1D1F">
                        <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                </div>
                <span class="menu-text">健康商城</span>
                <span class="menu-badge">新</span>
                <svg class="menu-arrow" width="20" height="20" viewBox="0 0 24 24" fill="#C7C7CC">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </div>

            <div class="menu-item" onclick="location.href='achievements.html'">
                <div class="menu-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#1D1D1F">
                        <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/>
                    </svg>
                </div>
                <span class="menu-text">成就徽章</span>
                <span class="menu-badge hot">热</span>
                <svg class="menu-arrow" width="20" height="20" viewBox="0 0 24 24" fill="#C7C7CC">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </div>

            <div class="menu-item" onclick="location.href='quiz.html'">
                <div class="menu-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#1D1D1F">
                        <path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/>
                    </svg>
                </div>
                <span class="menu-text">健康闯关</span>
                <span class="menu-badge reward">赚糖豆</span>
                <svg class="menu-arrow" width="20" height="20" viewBox="0 0 24 24" fill="#C7C7CC">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </div>

            <div class="menu-item" onclick="location.href='report.html'">
                <div class="menu-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#1D1D1F">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                    </svg>
                </div>
                <span class="menu-text">血糖报告</span>
                <span class="menu-badge new">新</span>
                <svg class="menu-arrow" width="20" height="20" viewBox="0 0 24 24" fill="#C7C7CC">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </div>

            <div class="menu-item" onclick="openExportModal()">
                <div class="menu-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#1D1D1F">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                    </svg>
                </div>
                <span class="menu-text">数据导出</span>
                <span class="menu-badge">PDF/Excel</span>
                <svg class="menu-arrow" width="20" height="20" viewBox="0 0 24 24" fill="#C7C7CC">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </div>
        </div>

        <!-- 紧急联系人卡片 -->
        <div class="emergency-card" id="emergency-card">
            <div class="emergency-header">
                <div class="emergency-title">
                    <span class="emergency-icon">🆘</span>
                    <span>紧急联系人</span>
                </div>
                <button class="add-contact-btn" onclick="openContactModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    添加
                </button>
            </div>
            <div class="emergency-list" id="emergency-list">
                <!-- 动态生成 -->
            </div>
            <div class="emergency-empty" id="emergency-empty">
                <span class="empty-icon">👨‍👩‍👧</span>
                <span class="empty-text">添加紧急联系人，血糖异常时可快速联系</span>
            </div>
            <div class="emergency-tip">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#86868B">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                </svg>
                <span>当血糖过低或过高时，可一键拨打紧急联系人电话</span>
            </div>
        </div>

        <!-- 紧急联系人弹窗 -->
        <div class="contact-modal" id="contact-modal">
            <div class="contact-content">
                <div class="contact-header">
                    <h3>👤 添加紧急联系人</h3>
                    <button class="close-btn" onclick="closeContactModal()">&times;</button>
                </div>
                <form id="contact-form" onsubmit="saveContact(event)">
                    <div class="form-group">
                        <label>称呼</label>
                        <input type="text" id="contact-name" placeholder="如：爸爸、妈妈、配偶" required>
                    </div>
                    <div class="form-group">
                        <label>电话号码</label>
                        <input type="tel" id="contact-phone" placeholder="请输入手机号码" required>
                    </div>
                    <div class="form-group">
                        <label>关系</label>
                        <select id="contact-relation">
                            <option value="家人">家人</option>
                            <option value="配偶">配偶</option>
                            <option value="子女">子女</option>
                            <option value="朋友">朋友</option>
                            <option value="医生">医生</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <button type="submit" class="save-contact-btn">保存联系人</button>
                </form>
            </div>
        </div>

        <!-- 设置卡片 -->
        <div class="settings-card">
            <div class="settings-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#86868B">
                    <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
                <span>设置</span>
            </div>
            
            <!-- 深色模式开关 -->
            <div class="setting-item">
                <div class="setting-info">
                    <span class="setting-icon">🌙</span>
                    <div class="setting-text">
                        <span class="setting-name">深色模式</span>
                        <span class="setting-desc">护眼深色主题，夜间使用更舒适</span>
                    </div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode()">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <!-- 自动深色模式 -->
            <div class="setting-item">
                <div class="setting-info">
                    <span class="setting-icon">🌓</span>
                    <div class="setting-text">
                        <span class="setting-name">自动切换</span>
                        <span class="setting-desc">根据系统设置自动切换深色模式</span>
                    </div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="auto-dark-toggle" onchange="toggleAutoDark()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <!-- 数据导出弹窗 -->
        <div class="export-modal" id="export-modal">
            <div class="export-content">
                <div class="export-header">
                    <h3>📤 导出健康数据</h3>
                    <button class="close-btn" onclick="closeExportModal()">&times;</button>
                </div>
                <div class="export-body">
                    <div class="export-options">
                        <label class="export-option">
                            <input type="checkbox" id="export-sugar" checked>
                            <span class="option-icon">🩸</span>
                            <span class="option-text">血糖记录</span>
                        </label>
                        <label class="export-option">
                            <input type="checkbox" id="export-medication" checked>
                            <span class="option-icon">💊</span>
                            <span class="option-text">用药记录</span>
                        </label>
                        <label class="export-option">
                            <input type="checkbox" id="export-exercise" checked>
                            <span class="option-icon">🏃</span>
                            <span class="option-text">运动记录</span>
                        </label>
                    </div>
                    <div class="export-range">
                        <label>导出时间范围</label>
                        <select id="export-range">
                            <option value="7">最近7天</option>
                            <option value="30" selected>最近30天</option>
                            <option value="90">最近3个月</option>
                            <option value="all">全部数据</option>
                        </select>
                    </div>
                    <div class="export-format">
                        <label>导出格式</label>
                        <div class="format-btns">
                            <button class="format-btn active" data-format="excel" onclick="selectFormat('excel')">
                                <span class="format-icon">📊</span>
                                Excel
                            </button>
                            <button class="format-btn" data-format="pdf" onclick="selectFormat('pdf')">
                                <span class="format-icon">📄</span>
                                PDF
                            </button>
                        </div>
                    </div>
                    <button class="export-btn" onclick="exportData()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                        </svg>
                        开始导出
                    </button>
                </div>
            </div>
        </div>

        <!-- 退出登录 -->
        <button class="logout-btn" id="logout-button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#FF3B30">
                <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
            </svg>
            退出登录
        </button>
    </div>
    <script src="js/config.js"></script>
</body>
</html>
