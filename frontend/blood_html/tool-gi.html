<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食物GI值查询 - 血糖管理系统</title>
    <link rel="stylesheet" href="css/tool-detail.css">
    <link rel="stylesheet" href="css/public.css">
    <script src="js/theme.js"></script>
    <script defer src="js/navbar.js"></script>
</head>
<body>
    <div class="tool-detail-container">
        <header class="tool-detail-header">
            <a href="tools.html" class="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#007AFF">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
            </a>
            <h1>食物GI值查询</h1>
        </header>

        <!-- 搜索框 -->
        <div class="search-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#86868B">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" id="gi-search" placeholder="搜索食物名称...">
        </div>

        <!-- GI 等级说明 -->
        <div class="gi-legend">
            <div class="legend-item low">
                <span class="dot"></span>
                <span>低GI (≤55)</span>
            </div>
            <div class="legend-item medium">
                <span class="dot"></span>
                <span>中GI (56-69)</span>
            </div>
            <div class="legend-item high">
                <span class="dot"></span>
                <span>高GI (≥70)</span>
            </div>
        </div>

        <!-- 分类标签 -->
        <div class="category-tabs">
            <button class="category-tab active" data-category="all">全部</button>
            <button class="category-tab" data-category="grain">谷物</button>
            <button class="category-tab" data-category="fruit">水果</button>
            <button class="category-tab" data-category="vegetable">蔬菜</button>
            <button class="category-tab" data-category="protein">蛋白质</button>
            <button class="category-tab" data-category="dairy">乳制品</button>
        </div>

        <!-- 食物列表 -->
        <div class="food-list" id="food-list">
            <!-- 动态生成 -->
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/tool-gi.js"></script>
</body>
</html>
