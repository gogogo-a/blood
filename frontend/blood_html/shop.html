<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康商城 - 血糖管理系统</title>
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/public.css">
    <script src="js/theme.js"></script>
    <script defer src="js/navbar.js"></script>
</head>
<body>
    <div class="shop-container">
        <!-- 头部 -->
        <header class="shop-header">
            <h1>健康商城</h1>
            <p>精选控糖好物，助力健康生活</p>
        </header>

        <!-- 糖豆卡片 -->
        <div class="balance-banner">
            <div class="balance-left">
                <span class="balance-label">
                    <span class="sugar-bean-icon">🍬</span>
                    我的糖豆
                </span>
                <span class="balance-amount" id="shop-balance">0</span>
            </div>
            <button class="my-orders-btn" onclick="toggleOrdersPanel()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
                我的订单
            </button>
        </div>

        <!-- 搜索和排序栏 -->
        <div class="search-sort-bar">
            <div class="search-box">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="search-input" placeholder="搜索商品..." oninput="handleSearch()">
                <button class="clear-search-btn" id="clear-search-btn" onclick="clearSearch()" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="sort-dropdown">
                <button class="sort-btn" onclick="toggleSortMenu()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/>
                    </svg>
                    <span id="sort-label">价格低到高</span>
                    <svg class="sort-arrow" width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7 10l5 5 5-5z"/>
                    </svg>
                </button>
                <div class="sort-menu" id="sort-menu">
                    <div class="sort-option active" data-sort="price-asc" onclick="selectSort('price-asc')">
                        <span>价格低到高</span>
                        <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                        </svg>
                    </div>
                    <div class="sort-option" data-sort="price-desc" onclick="selectSort('price-desc')">
                        <span>价格高到低</span>
                        <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                        </svg>
                    </div>
                    <div class="sort-option" data-sort="sales" onclick="selectSort('sales')">
                        <span>销量优先</span>
                        <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- 分类标签 -->
        <div class="category-tabs">
            <button class="tab-btn active" data-category="all">全部</button>
            <button class="tab-btn" data-category="food">控糖食品</button>
            <button class="tab-btn" data-category="device">监测设备</button>
            <button class="tab-btn" data-category="supplement">营养补充</button>
        </div>

        <!-- 商品列表 -->
        <div class="products-grid" id="products-grid">
            <!-- 商品由JS动态渲染 -->
        </div>
    </div>

    <!-- 地址填写弹窗 -->
    <div class="address-modal" id="address-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>填写收货地址</h3>
                <span class="close-btn" onclick="closeAddressModal()">&times;</span>
            </div>
            <div class="order-product" id="order-product">
                <!-- 商品信息由JS填充 -->
            </div>
            <form id="address-form">
                <div class="form-group">
                    <label>收货人</label>
                    <input type="text" id="receiver-name" placeholder="请输入收货人姓名" required>
                </div>
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="tel" id="receiver-phone" placeholder="请输入手机号码" required>
                </div>
                <div class="form-group">
                    <label>收货地址</label>
                    <textarea id="receiver-address" placeholder="请输入详细地址" rows="3" required></textarea>
                </div>
                <div class="order-summary">
                    <span>应付糖豆</span>
                    <span class="order-price" id="order-price">
                        <span class="sugar-bean-icon">🍬</span>0
                    </span>
                </div>
                <button type="submit" class="submit-btn" id="submit-order-btn">确认购买</button>
            </form>
        </div>
    </div>

    <!-- 购买成功弹窗 -->
    <div class="purchase-modal" id="purchase-modal">
        <div class="modal-content">
            <div class="success-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="#10B981">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <h3>购买成功</h3>
            <p id="purchase-message">感谢您的购买！</p>
            <button class="modal-btn" onclick="closePurchaseModal()">确定</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/shop.js"></script>

    <!-- 订单列表侧边栏 -->
    <div class="orders-overlay" id="orders-overlay" onclick="toggleOrdersPanel()"></div>
    <div class="orders-panel" id="orders-panel">
        <div class="orders-header">
            <h2>我的订单</h2>
            <button class="close-orders-btn" onclick="toggleOrdersPanel()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>
        <div class="orders-list" id="orders-list">
            <!-- 订单由JS动态渲染 -->
        </div>
    </div>
</body>
</html>
