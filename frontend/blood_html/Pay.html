<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线充值</title>
    <link rel="stylesheet" href="css/public.css">
    <link rel="stylesheet" href="css/Pay.css">
    <script src="js/theme.js"></script>
    <script defer src="js/navbar.js"></script>
</head>
<body>
    <div class="container">
        <!-- 当前糖豆卡片 -->
        <div class="balance-card">
            <div class="balance-info">
                <span class="balance-label">
                    <span class="sugar-bean-icon">🍬</span>
                    我的糖豆
                </span>
                <span class="balance-value" id="currentBalance">0</span>
            </div>
            <a href="order.html" class="history-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                充值记录
            </a>
        </div>

        <h1 class="title">选择充值糖豆</h1>
        
        <div class="amount-grid">
            <div class="amount-item" data-amount="10">
                <span class="amount-value">🍬 10</span>
            </div>
            <div class="amount-item" data-amount="30">
                <span class="amount-value">🍬 30</span>
            </div>
            <div class="amount-item popular" data-amount="50">
                <span class="popular-tag">热门</span>
                <span class="amount-value">🍬 50</span>
                <span class="bonus">送 2 糖豆</span>
            </div>
            <div class="amount-item" data-amount="100">
                <span class="amount-value">🍬 100</span>
                <span class="bonus">送 5 糖豆</span>
            </div>
            <div class="amount-item best-value" data-amount="300">
                <span class="best-tag">超值</span>
                <span class="amount-value">🍬 300</span>
                <span class="bonus">送 20 糖豆</span>
            </div>
            <div class="amount-item" data-amount="500">
                <span class="amount-value">🍬 500</span>
                <span class="bonus">送 40 糖豆</span>
            </div>
        </div>

        <div class="custom-amount">
            <input type="number" class="custom-input" 
                   placeholder="输入自定义糖豆数量（1-10000）" min="1" max="10000"
                   step="1" id="customAmount">
        </div>

        <div class="section-title">选择支付方式</div>
        <div class="payment-methods">
            <div class="method-item" data-type="0">
                <img src="https://img2.baidu.com/it/u=277440210,793964257&fm=253&fmt=auto&app=138&f=PNG?w=500&h=500" class="method-icon">
                <span>支付宝</span>
                <span class="recommend-badge">推荐</span>
            </div>
            <div class="method-item" data-type="1">
                <img src="https://img0.baidu.com/it/u=4041507410,3465774008&fm=253&fmt=auto&app=138&f=JPEG?w=366&h=370" class="method-icon">
                <span>微信支付</span>
            </div>
        </div>

        <!-- 支付金额预览 -->
        <div class="pay-preview" id="payPreview">
            <div class="preview-row">
                <span>充值糖豆</span>
                <span id="previewAmount">🍬 0</span>
            </div>
            <div class="preview-row bonus-row" id="bonusRow" style="display: none;">
                <span>赠送糖豆</span>
                <span class="bonus-text" id="previewBonus">+🍬 0</span>
            </div>
            <div class="preview-row total-row">
                <span>实际到账</span>
                <span class="total-text" id="previewTotal">🍬 0</span>
            </div>
        </div>

        <button class="pay-button" disabled id="payButton">
            <span class="btn-text">立即支付</span>
            <span class="btn-amount" id="btnAmount"></span>
        </button>
        <div class="error-message" id="errorMessage"></div>

        <!-- 糖豆用途说明 -->
        <div class="usage-tips">
            <div class="tips-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4M12 8h.01"/>
                </svg>
                糖豆可用于
            </div>
            <div class="tips-list">
                <span class="tip-item">🤖 AI智能问答</span>
                <span class="tip-item">🛒 健康商城购物</span>
                <span class="tip-item">📊 专业报告生成</span>
                <span class="tip-item">🎁 积分兑换</span>
            </div>
        </div>

        <!-- 安全提示 -->
        <div class="security-notice">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span>安全支付 · 即时到账 · 官方保障</span>
        </div>
    </div>
<script src="js/config.js"></script>
<script src="js/Pay.js"></script>
</body>
</html>
