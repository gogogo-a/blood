<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单</title>
    <link rel="stylesheet" href="css/order.css">
    <link rel="stylesheet" href="css/public.css">
    <script src="js/theme.js"></script>
    <script defer src="js/navbar.js"></script>
</head>
<body>
    <div class="container">
        <!-- 订单统计卡片 -->
        <div class="stats-card">
            <div class="stats-header">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                <span>订单概览</span>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="totalOrders">0</span>
                    <span class="stat-label">全部订单</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value pending" id="pendingOrders">0</span>
                    <span class="stat-label">待支付</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value completed" id="completedOrders">0</span>
                    <span class="stat-label">已完成</span>
                </div>
            </div>
        </div>

        <!-- 订单筛选标签 -->
        <div class="filter-tabs">
            <div class="tab-item active" data-filter="all">全部</div>
            <div class="tab-item" data-filter="pending">待支付</div>
            <div class="tab-item" data-filter="completed">已完成</div>
            <div class="tab-item" data-filter="cancelled">已取消</div>
        </div>

        <!-- 订单列表 -->
        <div class="orders-section">
            <div id="order-container" class="orders-list"></div>
            
            <!-- 空状态 -->
            <div id="empty-state" class="empty-state" style="display: none;">
                <div class="empty-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                </div>
                <p class="empty-text">暂无订单记录</p>
                <p class="empty-hint">快去充值体验更多功能吧</p>
                <a href="Pay.html" class="empty-action">立即充值</a>
            </div>

            <!-- 加载更多 -->
            <div id="loading-more" class="loading-more">
                <button id="load-more-btn" class="load-more-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    加载更多
                </button>
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/order.js"></script>
</body>
</html>
