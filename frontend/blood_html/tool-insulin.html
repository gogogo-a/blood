<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胰岛素剂量计算 - 血糖管理系统</title>
    <link rel="stylesheet" href="css/tool-detail.css">
    <link rel="stylesheet" href="css/tool-calculator.css">
    <link rel="stylesheet" href="css/public.css">
    <script src="js/theme.js"></script>
    <script defer src="js/navbar.js"></script>
</head>
<body>
    <div class="tool-detail-container">
        <header class="tool-detail-header">
            <a href="tools.html" class="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#007AFF">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
            </a>
            <h1>胰岛素剂量计算</h1>
        </header>

        <!-- 警告提示 -->
        <div class="warning-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#F59E0B">
                <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
            </svg>
            <p>本计算器仅供参考，实际剂量请遵医嘱。首次使用胰岛素必须在医生指导下进行。</p>
        </div>

        <!-- 计算器表单 -->
        <div class="calc-card">
            <div class="calc-form">
                <div class="form-group">
                    <label>当前血糖 (mmol/L)</label>
                    <input type="number" id="current-bg" placeholder="如：8.5" step="0.1">
                </div>

                <div class="form-group">
                    <label>目标血糖 (mmol/L)</label>
                    <input type="number" id="target-bg" placeholder="通常为 5.5-7.0" value="6.0" step="0.1">
                </div>

                <div class="form-group">
                    <label>计划摄入碳水 (克)</label>
                    <input type="number" id="carb-intake" placeholder="如：50">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>胰岛素敏感系数 (ISF)</label>
                        <input type="number" id="isf" placeholder="如：2.0" value="2.0" step="0.1">
                        <small class="form-hint">1单位胰岛素降低的血糖值</small>
                    </div>

                    <div class="form-group">
                        <label>碳水系数 (ICR)</label>
                        <input type="number" id="icr" placeholder="如：10" value="10">
                        <small class="form-hint">1单位胰岛素覆盖的碳水克数</small>
                    </div>
                </div>

                <button class="calc-btn" onclick="calculateInsulin()">计算剂量</button>
            </div>
        </div>

        <!-- 计算结果 -->
        <div class="result-card" id="result-card" style="display: none;">
            <h3>建议胰岛素剂量</h3>
            <div class="result-main">
                <span class="result-value" id="result-value">0</span>
                <span class="result-unit">单位</span>
            </div>
            <div class="result-breakdown">
                <div class="breakdown-item">
                    <span>校正剂量</span>
                    <span id="correction-dose">0 单位</span>
                </div>
                <div class="breakdown-item">
                    <span>餐时剂量</span>
                    <span id="meal-dose">0 单位</span>
                </div>
            </div>
        </div>

        <!-- 参考信息 -->
        <div class="info-card">
            <h3>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#86868B">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                </svg>
                计算公式说明
            </h3>
            <ul class="info-list">
                <li><strong>校正剂量</strong> = (当前血糖 - 目标血糖) ÷ ISF</li>
                <li><strong>餐时剂量</strong> = 碳水摄入量 ÷ ICR</li>
                <li><strong>总剂量</strong> = 校正剂量 + 餐时剂量</li>
                <li>ISF 和 ICR 因人而异，请咨询医生确定您的个人参数</li>
            </ul>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        function calculateInsulin() {
            const currentBG = parseFloat(document.getElementById('current-bg').value);
            const targetBG = parseFloat(document.getElementById('target-bg').value);
            const carbIntake = parseFloat(document.getElementById('carb-intake').value);
            const isf = parseFloat(document.getElementById('isf').value);
            const icr = parseFloat(document.getElementById('icr').value);

            // 验证输入
            if (!currentBG || !targetBG || !carbIntake || !isf || !icr) {
                alert('请填写所有必要信息');
                return;
            }

            if (isf <= 0 || icr <= 0) {
                alert('ISF 和 ICR 必须大于 0');
                return;
            }

            // 计算校正剂量（如果当前血糖低于目标，校正剂量为0）
            let correctionDose = 0;
            if (currentBG > targetBG) {
                correctionDose = (currentBG - targetBG) / isf;
            }

            // 计算餐时剂量
            const mealDose = carbIntake / icr;

            // 总剂量
            const totalDose = correctionDose + mealDose;

            // 显示结果
            document.getElementById('result-card').style.display = 'block';
            document.getElementById('result-value').textContent = totalDose.toFixed(1);
            document.getElementById('correction-dose').textContent = correctionDose.toFixed(1) + ' 单位';
            document.getElementById('meal-dose').textContent = mealDose.toFixed(1) + ' 单位';

            // 滚动到结果
            document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });
        }
    </script>

    <style>
        .warning-card {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: #FEF3C7;
            border-radius: var(--detail-radius);
            padding: 16px;
            margin-bottom: 16px;
        }

        .warning-card svg {
            flex-shrink: 0;
            margin-top: 2px;
        }

        .warning-card p {
            font-size: 13px;
            color: #92400E;
            margin: 0;
            line-height: 1.5;
        }

        .form-hint {
            font-size: 12px;
            color: var(--detail-text-secondary);
            margin-top: 4px;
        }

        .result-breakdown {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #F0F0F5;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--detail-text-secondary);
        }

        .breakdown-item span:last-child {
            font-weight: 500;
            color: var(--detail-text-primary);
        }
    </style>
</body>
</html>
