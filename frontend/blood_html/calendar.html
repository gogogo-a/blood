<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康日历</title>
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/public.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <div class="calendar-container">
        <!-- 顶部导航 -->
        <div class="calendar-header">
            <button class="back-btn" onclick="history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </button>
            <h1>健康日历</h1>
            <button class="today-btn" onclick="goToToday()">今天</button>
        </div>

        <!-- 月份切换 -->
        <div class="month-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
            </button>
            <div class="month-display">
                <span class="current-year" id="current-year">2025</span>
                <span class="current-month" id="current-month">1月</span>
            </div>
            <button class="nav-btn" onclick="changeMonth(1)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                </svg>
            </button>
        </div>

        <!-- 统计概览 -->
        <div class="stats-overview">
            <div class="stat-item">
                <span class="stat-value" id="stat-normal">0</span>
                <span class="stat-label">达标天数</span>
                <div class="stat-dot normal"></div>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="stat-high">0</span>
                <span class="stat-label">偏高天数</span>
                <div class="stat-dot high"></div>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="stat-low">0</span>
                <span class="stat-label">偏低天数</span>
                <div class="stat-dot low"></div>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="stat-records">0</span>
                <span class="stat-label">记录天数</span>
                <div class="stat-dot records"></div>
            </div>
        </div>

        <!-- 星期标题 -->
        <div class="weekday-header">
            <span>日</span>
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
        </div>

        <!-- 日历网格 -->
        <div class="calendar-grid" id="calendar-grid">
            <!-- 动态生成 -->
        </div>

        <!-- 图例 -->
        <div class="legend">
            <div class="legend-item">
                <span class="legend-dot normal"></span>
                <span>血糖达标</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot high"></span>
                <span>血糖偏高</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot low"></span>
                <span>血糖偏低</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon">💊</span>
                <span>有用药</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon">🏃</span>
                <span>有运动</span>
            </div>
        </div>
    </div>

    <!-- 日期详情弹窗 -->
    <div class="detail-modal" id="detail-modal">
        <div class="detail-content">
            <div class="detail-header">
                <h3 id="detail-date">2025年1月1日</h3>
                <button class="close-btn" onclick="closeDetailModal()">&times;</button>
            </div>
            <div class="detail-body" id="detail-body">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/calendar.js"></script>
    <script defer src="js/navbar.js"></script>
</body>
</html>
