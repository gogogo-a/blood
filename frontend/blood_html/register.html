<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 血糖管理系统</title>
    <link rel="stylesheet" href="css/auth.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>血糖管理系统</h1>
            <p>创建新账户</p>
        </div>

        <form>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名（4-16个字符）" required>
                <div class="error-message" id="username-error"></div>
            </div>

            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="请输入邮箱地址" required>
                <div class="error-message" id="email-error"></div>
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
                <div class="password-requirements">
                    密码长度8-20位，必须包含字母和数字
                </div>
                <div class="error-message" id="password-error"></div>
            </div>

            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirm-password" placeholder="请再次输入密码" required>
                <div class="error-message" id="confirm-password-error"></div>
            </div>

            <div class="form-group">
                <label>验证码</label>
                <div class="verify-code-group">
                    <input type="text" id="verify-code" placeholder="请输入验证码" required>
                    <button type="button" class="verify-code-btn">获取验证码</button>
                </div>
                <div class="error-message" id="verify-code-error"></div>
            </div>

            <button type="submit" class="register-btn">注册</button>
        </form>

        <div class="login-link">
            已有账户？<a href="login.html">立即登录</a>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
